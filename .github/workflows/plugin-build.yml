name: Build RetakesPlugin

on:
  push:
    branches: [ "master" ]
    paths:
      - '**.cs'
      - '**.csproj'
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.cs'
      - '**.csproj'
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Build RetakesPluginShared
        run: |
          cd RetakesPluginShared
          dotnet build -c Release

      - name: Publish RetakesPlugin
        run: |
          cd RetakesPlugin
          dotnet publish -c Release --no-self-contained -o ../publish

      - name: Create output directory with complete structure
        run: |
          PLUGIN_SRC=publish
          PLUGIN_DST=output/addons/counterstrikesharp/plugins/RetakesPlugin
          SHARED_DST=output/addons/counterstrikesharp/shared/RetakesPluginShared

          mkdir -p "$PLUGIN_DST/runtimes/linux-x64/native"
          mkdir -p "$SHARED_DST"

          # Core plugin DLLs
          cp "$PLUGIN_SRC/RetakesPlugin.dll"  "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/RetakesPlugin.pdb"  "$PLUGIN_DST/"

          # SQLite managed DLLs (not bundled with CounterStrikeSharp)
          cp "$PLUGIN_SRC/Microsoft.Data.Sqlite.dll"              "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.batteries_v2.dll"          "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.core.dll"                  "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.provider.e_sqlite3.dll"    "$PLUGIN_DST/"

          # Native SQLite binary – placed in plugin root so the NativeLibrary
          # resolver finds it first (CSS does not probe runtimes/ automatically)
          cp "$PLUGIN_SRC/runtimes/linux-x64/native/libe_sqlite3.so" "$PLUGIN_DST/"
          # Also keep a copy in the standard runtimes path as fallback
          cp "$PLUGIN_SRC/runtimes/linux-x64/native/libe_sqlite3.so" \
             "$PLUGIN_DST/runtimes/linux-x64/native/"

          # Static assets
          cp -r ./RetakesPlugin/map_config "$PLUGIN_DST/"
          cp -r ./RetakesPlugin/lang       "$PLUGIN_DST/"

          # Shared library
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.dll        "$SHARED_DST/"
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.pdb        "$SHARED_DST/"
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.deps.json  "$SHARED_DST/"

      - name: Create output directory without map configs
        run: |
          PLUGIN_SRC=publish
          PLUGIN_DST=output-no-map-configs/addons/counterstrikesharp/plugins/RetakesPlugin
          SHARED_DST=output-no-map-configs/addons/counterstrikesharp/shared/RetakesPluginShared

          mkdir -p "$PLUGIN_DST/runtimes/linux-x64/native"
          mkdir -p "$SHARED_DST"

          # Core plugin DLLs
          cp "$PLUGIN_SRC/RetakesPlugin.dll"  "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/RetakesPlugin.pdb"  "$PLUGIN_DST/"

          # SQLite managed DLLs (not bundled with CounterStrikeSharp)
          cp "$PLUGIN_SRC/Microsoft.Data.Sqlite.dll"              "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.batteries_v2.dll"          "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.core.dll"                  "$PLUGIN_DST/"
          cp "$PLUGIN_SRC/SQLitePCLRaw.provider.e_sqlite3.dll"    "$PLUGIN_DST/"

          # Native SQLite binary – placed in plugin root so the NativeLibrary
          # resolver finds it first (CSS does not probe runtimes/ automatically)
          cp "$PLUGIN_SRC/runtimes/linux-x64/native/libe_sqlite3.so" "$PLUGIN_DST/"
          # Also keep a copy in the standard runtimes path as fallback
          cp "$PLUGIN_SRC/runtimes/linux-x64/native/libe_sqlite3.so" \
             "$PLUGIN_DST/runtimes/linux-x64/native/"

          # Static assets (no map_config)
          cp -r ./RetakesPlugin/lang "$PLUGIN_DST/"

          # Shared library
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.dll        "$SHARED_DST/"
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.pdb        "$SHARED_DST/"
          cp ./RetakesPluginShared/bin/Release/net8.0/RetakesPluginShared.deps.json  "$SHARED_DST/"
      
      - name: Publish artifact (with map configs)
        uses: actions/upload-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}
          path: output

      - name: Publish artifact (no map configs)
        uses: actions/upload-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}-no-map-configs
          path: output-no-map-configs
  
  release:
    needs: build
    permissions: write-all
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    steps:
      - name: Download build artifact (with map configs)
        uses: actions/download-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}
          path: ./with-map-configs

      - name: Download build artifact (no map configs)
        uses: actions/download-artifact@v4
        with:
          name: RetakesPlugin-${{ github.sha }}-no-map-configs
          path: ./no-map-configs

      - name: Create release assets
        run: |
          cd with-map-configs
          zip -r ../RetakesPlugin-${{ github.event.release.tag_name }}.zip ./addons
          cd ../no-map-configs
          zip -r ../RetakesPlugin-${{ github.event.release.tag_name }}-no-map-configs.zip ./addons

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./RetakesPlugin-${{ github.event.release.tag_name }}.zip
            ./RetakesPlugin-${{ github.event.release.tag_name }}-no-map-configs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}